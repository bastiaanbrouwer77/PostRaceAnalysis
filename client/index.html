<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostRaceAnalysis</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            color: #222;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 18px 50px rgba(0,0,0,0.08);
        }
        h1, h2, h3 {
            color: #111;
            margin: 0 0 10px;
        }
        p {
            margin: 0 0 14px;
            line-height: 1.5;
        }
        .panel {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            margin-bottom: 20px;
        }
        .panel-card {
            flex: 1;
            min-width: 280px;
            background: #fcfcfd;
            border: 1px solid #e6e8ec;
            border-radius: 14px;
            padding: 18px;
            box-shadow: inset 0 0 0 1px rgba(19, 32, 60, 0.03);
        }
        label {
            display: block;
            margin: 10px 0 4px;
            font-size: 0.94rem;
            color: #4b5563;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 0.96rem;
            box-sizing: border-box;
        }
        button {
            margin-top: 14px;
            padding: 12px 18px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 0.95rem;
            cursor: pointer;
        }
        button:hover {
            filter: brightness(1.05);
        }
        .event-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .event-item {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        .event-item.selected {
            border-color: #2563eb;
            background: #eff6ff;
        }
        .event-select {
            width: 100%;
            text-align: left;
            border: none;
            background: none;
            padding: 14px 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }
        .event-meta {
            padding: 0 16px 14px;
            color: #555;
            font-size: 0.92rem;
        }
        .detail-card {
            min-width: 320px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PostRaceAnalysis</h1>
        <p>Create races and find them later using the search panel.</p>
        <div id="app"></div>
    </div>
    <script src="/env-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
