version: '3.8'
services:
  api:
    build: ./server_py
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    volumes:
      - ./server_py:/app
    command: python app.py

  web:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - api
    environment:
      - REACT_APP_API_BASE=http://localhost:5000
